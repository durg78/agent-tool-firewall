# ATF Proxy Configuration
#
# ATF (Agent-Tool-Firewall) is a security proxy for AI agent workflows.
# It protects against two primary threats:
# 1. Indirect prompt injection in responses (rules 12001-12009)
# 2. Outbound sensitive data leakage from agent tool usage (rules 900001-900022)
#
# Threat Model:
# Agents "vibe code" by reading source code, config files, and credentials,
# then accidentally including them in outbound requests (search queries, API calls,
# debugging tools). This firewall detects and blocks such leakage.
#
# Design Philosophy:
# - Response inspection: pass + score-based blocking (threshold at rule 12009)
# - Request inspection: deny-by-default for sensitive data patterns
# - Whitelist: only auth endpoints receive credentials

port: 3123
max_body_size_mb: 8
workers: 4

# Logging configuration
logging:
  enabled: true
  format: json
  destination: ./logs/atf-audit.log
  rotation:
    max_size_mb: 100
    max_backups: 5
    max_age_days: 30
    compress: true

# Coraza WAF configuration
coraza:
  rules_file: ./rules/custom.rules

# Prompt injection detection threshold (0-10, higher = more strict)
prompt_injection_threshold: 7

# Security settings
request_timeout_seconds: 30
response_timeout_seconds: 30
rate_limit_per_minute: 60
enable_debug_logging: false
sanitize_error_messages: true

# =============================================================================
# REQUEST PROTECTION CONFIGURATION
# =============================================================================
# Protects against sensitive data leakage in outgoing requests.
# When enabled, all outgoing requests are checked for sensitive data via
# SecLang rules (IDs 900001-900022). The whitelist specifies which destinations
# are allowed to receive data matching specific rule IDs.
#
# Rule ID Reference:
#   900001 - AWS Access Key ID (AKIA)
#   900002 - AWS Session Token (ASIA)
#   900003 - GitHub Token (ghp_, gho_, ghu_, ghs_, ghr_)
#   900004 - GitLab Token (glpat-)
#   900005 - Slack Token (xoxb-, xoxp-, etc.)
#   900006 - Stripe Key (sk_live_, sk_test_)
#   900007 - Stripe Restricted Key (rk_live_, rk_test_)
#   900008 - OpenAI Key (sk-proj-, sk-svcacct-)
#   900009 - Anthropic Key (sk-ant-)
#   900010 - Google OAuth Refresh Token (ya29.)
#   900011 - PostgreSQL Connection String
#   900012 - MongoDB Connection String
#   900013 - MySQL Connection String
#   900014 - Redis Connection String
#   900015 - Private Key Material (-----BEGIN PRIVATE KEY-----)
#   900016-900018 - Cloud Metadata SSRF (AWS, GCP, Azure)
#   900019 - Internal/Private IP Access
#   900020-900022 - Generic Code-Context Leakage
#
# Whitelist Entries:
#   Only the following services are allowed to receive credentials:
#   - OpenAI API (allows sk-proj-, sk-svcacct-)
#   - Anthropic API (allows sk-ant-)
#   - Stripe API (allows sk_live_, sk_test_, rk_live_, rk_test_)
#   - GitHub API (allows ghp_, gho_, ghu_, ghs_, ghr_)
#   - Slack API (allows xoxb-, xoxp-, etc.)
#
#   All other services (search engines, StackOverflow, debugging tools, etc.)
#   are denied for all sensitive data patterns by default.
#
# Pattern Types:
#   - wildcard domain: "*.example.com" (matches any subdomain)
#   - wildcard path: "example.com/*" (matches any path on domain)
#   - regex: "re:^https://..." (full regex pattern)
#   - exact/substring: "api.example.com" (literal match)
# =============================================================================
request_protection:
  enabled: true

  whitelist:
    # OpenAI API - allows sk-proj-, sk-svcacct-
    - url_pattern: "api.openai.com/*"
      allowed_rule_ids: [900008]
      description: "OpenAI API"

    # Anthropic API - allows sk-ant-
    - url_pattern: "api.anthropic.com/*"
      allowed_rule_ids: [900009]
      description: "Anthropic Claude API"

    # Stripe API - allows sk_live_, sk_test_, rk_live_, rk_test_
    - url_pattern: "api.stripe.com/*"
      allowed_rule_ids: [900006, 900007]
      description: "Stripe API"

    # GitHub API - allows all GitHub token types
    - url_pattern: "api.github.com/*"
      allowed_rule_ids: [900003]
      description: "GitHub API"

    # Slack API - allows all Slack token types
    - url_pattern: "slack.com/*"
      allowed_rule_ids: [900005]
      description: "Slack API"
